# Single-package workspace declaration. pnpm 9 reads any pnpm-workspace.yaml
# in a directory as a workspace declaration and refuses to install unless
# it finds a non-empty `packages:` list, even for a single-package project.
# Adding '.' here satisfies that check; the allowBuilds + ignoredBuiltDependencies
# fields continue to apply to the same package.
packages:
  - '.'

allowBuilds:
  sharp: true
  unrs-resolver: true
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
