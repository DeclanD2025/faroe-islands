<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0a0e0f"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4035"/>
      <stop offset="100%" stop-color="#2d3a3f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Mountains -->
  <polygon points="0,380 120,180 180,260 280,140 380,230 420,200 512,340 512,512 0,512" fill="url(#mountain)" opacity="0.6"/>
  <polygon points="0,420 140,280 200,330 300,240 400,320 512,290 512,512 0,512" fill="#2d3a3f" opacity="0.4"/>
  <!-- Waterfall streak -->
  <line x1="260" y1="170" x2="260" y2="320" stroke="#8a9ba0" stroke-width="3" opacity="0.6"/>
  <!-- Golden accent line -->
  <rect x="80" y="420" width="352" height="3" rx="1.5" fill="#c49a3f" opacity="0.6"/>
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#f5f0e8" letter-spacing="2">FØ</text>
</svg>
